<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الأسئلة الشائعة | KHALÉ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="headerMount"></div>

  <div class="page-hero">
    <div class="page-hero-inner">
      <div class="breadcrumb">
        <a href="index.html">الرئيسية</a>
        <span class="bc-sep">›</span>
        <span>الأسئلة الشائعة</span>
      </div>
      <h1 class="page-hero-title">الأسئلة الشائعة</h1>
      <p class="page-hero-desc">كل ما تحتاجين معرفته عن منتجات وخدمات KHALÉ</p>
    </div>
  </div>

  <section class="section">
    <div class="container">

      <!-- Search -->
      <div class="faq-srch">
        <svg class="faq-srch-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
        <input type="text" id="faqSearch" placeholder="ابحثي عن سؤال...">
      </div>

      <div class="faq-layout">
        <!-- Sidebar -->
        <div class="faq-sidebar" id="faqSidebar"></div>
        <!-- Accordion -->
        <div id="faqAccordion"></div>
      </div>
    </div>
  </section>

  <!-- Still need help CTA -->
  <section style="padding:0 0 var(--py)">
    <div class="container">
      <div style="background:var(--dark);border-radius:20px;padding:3rem;text-align:center;position:relative;overflow:hidden">
        <div style="position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(191,142,54,.1) 0%,transparent 60%);pointer-events:none"></div>
        <div style="position:relative;z-index:1">
          <h3 style="font-family:var(--font-display);font-size:1.8rem;color:#fff;margin-bottom:.75rem">لم تجدي إجابتكِ؟</h3>
          <p style="color:rgba(255,255,255,.5);margin-bottom:2rem;font-size:.9rem">فريقنا دائماً جاهز للمساعدة. لا تترددي في التواصل معنا.</p>
          <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap">
            <a href="contact.html" class="btn btn-gold btn-lg">تواصلي معنا</a>
            <a href="https://wa.me/9647501234567" class="btn btn-outline-light btn-lg" target="_blank" rel="noopener">
              <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" width="16" height="16"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.122 1.532 5.857L.057 23.8a.5.5 0 00.606.63l6.17-1.617A11.954 11.954 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.81 9.81 0 01-4.998-1.366l-.358-.213-3.714.974.991-3.617-.234-.373A9.8 9.8 0 012.182 12c0-5.418 4.4-9.818 9.818-9.818S21.818 6.582 21.818 12s-4.4 9.818-9.818 9.818z"/></svg>
              واتساب
            </a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="footerMount"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('headerMount').innerHTML = renderHeader('faq');
    document.getElementById('footerMount').innerHTML = renderFooter();

    const FAQ_DATA = [
      {
        category: "الطلبات والتوصيل",
        icon: `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1M5 17a2 2 0 104 0m-4 0a2 2 0 114 0m6 0a2 2 0 104 0m-4 0a2 2 0 114 0"/></svg>`,
        items: [
          { q: "كم يستغرق التوصيل؟", a: "يستغرق التوصيل داخل بغداد 24 ساعة. أما المحافظات الأخرى فتصلكِ خلال 2-4 أيام عمل." },
          { q: "هل التوصيل مجاني؟", a: "نعم! التوصيل مجاني تماماً للطلبات التي تتجاوز 80,000 دينار عراقي. للطلبات دون ذلك، رسوم الشحن 5,000 دينار فقط." },
          { q: "هل يمكنني تتبع طلبي؟", a: "بعد تأكيد طلبكِ، سيتواصل معكِ فريقنا عبر رقم الهاتف المسجل لإبلاغكِ بحالة الطلب ووقت التوصيل المتوقع." },
          { q: "هل تتوفر خدمة التوصيل لجميع المحافظات؟", a: "نعم! نوصل لجميع المحافظات العراقية بما فيها بغداد، البصرة، نينوى، أربيل، النجف، كربلاء، وجميع المحافظات الأخرى." },
        ]
      },
      {
        category: "الدفع والأسعار",
        icon: `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>`,
        items: [
          { q: "ما هي طرق الدفع المتاحة؟", a: "نقبل طريقتين للدفع: الدفع عند الاستلام نقداً، أو الدفع المسبق عبر تطبيق ZainCash." },
          { q: "هل هناك رسوم إضافية على الدفع؟", a: "لا توجد أي رسوم إضافية على الدفع عند الاستلام. طريقة ZainCash أيضاً بدون رسوم إضافية من طرفنا." },
          { q: "هل يمكنني استخدام كوبون الخصم؟", a: "نعم! يمكنكِ إدخال كود الخصم في صفحة السلة. تابعينا على وسائل التواصل للحصول على أحدث الكوبونات." },
          { q: "متى تنتهي صلاحية عروضكم؟", a: "تختلف مدة العروض، بعضها محدود بالوقت وبعضها محدود بالكمية. ننصحكِ بالطلب بسرعة." },
        ]
      },
      {
        category: "الإرجاع والاستبدال",
        icon: `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>`,
        items: [
          { q: "هل يمكنني إرجاع المنتج؟", a: "نعم! نقبل الإرجاع خلال 14 يوماً من تاريخ الاستلام، بشرط أن يكون المنتج في حالته الأصلية غير مستخدم ومع عبوته الكاملة." },
          { q: "كيف يتم الاستبدال؟", a: "للاستبدال، تواصلي معنا عبر واتساب أو الهاتف خلال 14 يوماً من الاستلام. سيقوم موظفنا بترتيب استلام المنتج وإرسال البديل." },
          { q: "متى يتم رد المبلغ؟", a: "يتم رد المبلغ كاملاً خلال 3-5 أيام عمل من استلام المنتج المُرجَع." },
          { q: "ما هي حالات الإرجاع المقبولة؟", a: "نقبل الإرجاع في حالة: المنتج تالف أو معيب، منتج خاطئ أو لا يطابق الوصف، أو في حال لم يلبِ توقعاتكِ خلال 14 يوماً." },
        ]
      },
      {
        category: "المنتجات والاستخدام",
        icon: `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>`,
        items: [
          { q: "هل منتجات KHALÉ آمنة على جميع أنواع الشعر؟", a: "نعم! منتجاتنا مناسبة لجميع أنواع الشعر. مع ذلك، ننصح دائماً باستخدام درجة الحرارة المناسبة لنوع شعركِ واستخدام واقي الحرارة." },
          { q: "كيف أحافظ على منتجات KHALÉ؟", a: "احفظي الأدوات في مكان جاف بعيداً عن الرطوبة. نظفي الفرش بانتظام وتأكدي من فصل الطاقة بعد الاستخدام." },
          { q: "هل الطقم الكامل يستحق السعر؟", a: "بالتأكيد! الطقم يوفر لكِ توفيراً يصل إلى 55,000 دينار مقارنة بشراء المنتجات منفردة." },
          { q: "هل يوجد ضمان على المنتجات؟", a: "نعم! جميع منتجات KHALÉ تأتي مع ضمان جودة لمدة 6 أشهر من تاريخ الشراء ضد أي عيوب في التصنيع." },
        ]
      },
      {
        category: "الحساب والخصوصية",
        icon: `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>`,
        items: [
          { q: "هل يجب أن أسجل حساباً للشراء؟", a: "لا! يمكنكِ الشراء كضيف دون تسجيل. لكن التسجيل يمنحكِ مزايا إضافية مثل متابعة الطلبات وحفظ عنوان التوصيل." },
          { q: "كيف تحمون بياناتي الشخصية؟", a: "بياناتكِ الشخصية محمية ومشفرة ولن يتم مشاركتها مع أي طرف ثالث. نستخدمها فقط لتنفيذ طلباتكِ وتحسين خدمتنا." },
          { q: "هل يمكنني حذف حسابي؟", a: "نعم، يمكنكِ حذف حسابكِ وجميع بياناتكِ في أي وقت بالتواصل مع فريق الدعم." },
        ]
      },
    ];

    /* Render sidebar */
    document.getElementById('faqSidebar').innerHTML = FAQ_DATA.map((cat, i) => `
      <button class="faq-cat-btn${i===0?' active':''}" data-cat="${i}">
        <span style="width:15px;height:15px;flex-shrink:0">${cat.icon}</span>
        ${cat.category}
      </button>`).join('');

    /* Render FAQ accordion */
    function renderFAQs(data) {
      const container = document.getElementById('faqAccordion');
      if (!data.length) {
        container.innerHTML = `<p style="text-align:center;color:var(--text-3);padding:2rem">لا توجد نتائج مطابقة</p>`;
        return;
      }
      container.innerHTML = data.map(cat => `
        <div class="faq-cat-section" style="margin-bottom:2.5rem">
          <h3 style="font-size:1rem;font-weight:700;color:var(--dark);margin-bottom:1rem;display:flex;align-items:center;gap:.5rem">
            <span style="color:var(--gold);width:16px;height:16px">${cat.icon}</span>
            ${cat.category}
          </h3>
          ${cat.items.map(item => `
            <div class="faq-item">
              <button class="faq-q">
                ${item.q}
                <span class="faq-chevron">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                </span>
              </button>
              <div class="faq-ans">
                <div class="faq-ans-inner">${item.a}</div>
              </div>
            </div>`).join('')}
        </div>`).join('');
      initFAQ();
    }

    renderFAQs(FAQ_DATA);

    /* Category filter */
    document.getElementById('faqSidebar').addEventListener('click', e => {
      const btn = e.target.closest('.faq-cat-btn');
      if (!btn) return;
      document.querySelectorAll('.faq-cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderFAQs([FAQ_DATA[parseInt(btn.dataset.cat)]]);
    });

    /* Search */
    document.getElementById('faqSearch').addEventListener('input', function() {
      const q = this.value.trim().toLowerCase();
      if (!q) { renderFAQs(FAQ_DATA); return; }
      const filtered = FAQ_DATA.map(cat => ({
        ...cat,
        items: cat.items.filter(item =>
          item.q.toLowerCase().includes(q) || item.a.toLowerCase().includes(q))
      })).filter(cat => cat.items.length);
      renderFAQs(filtered);
      document.querySelectorAll('.faq-cat-btn').forEach(b => b.classList.remove('active'));
    });
  </script>
</body>
</html>
